<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CofreSenhaRust</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <img class="app-logo" src="icons/logo-sg.svg" alt="Logo CofreSenhaRust" width="64" height="64" />
        <div class="app-header-text">
          <h1>CofreSenhaRust</h1>
          <p id="backend-state">Status do backend: verificando...</p>
        </div>
      </header>

      <nav class="tabs" aria-label="Seções da extensão">
        <button id="tab-entries-btn" class="tab-btn active" type="button" data-tab-target="entries-panel">Credenciais</button>
        <button id="tab-create-btn" class="tab-btn" type="button" data-tab-target="create-panel">Cadastrar chave</button>
      </nav>

      <section class="app-content">
        <section id="unlock-panel" class="unlock-panel">
          <label for="master-password">Senha mestra</label>
          <input id="master-password" type="password" autocomplete="off" placeholder="Digite sua senha mestra" />
          <div class="unlock-actions">
            <button id="unlock-btn" type="button">Desbloquear</button>
            <button id="create-vault-btn" type="button" class="secondary">Cadastrar cofre</button>
          </div>
        </section>

        <section id="entries-panel" class="panel entries-panel">
          <div class="entries-header">
            <h2>Credenciais</h2>
            <div class="entries-header-actions">
              <button id="refresh-btn" type="button" class="secondary">Atualizar</button>
              <button id="lock-btn" type="button" class="secondary">Desconectar</button>
            </div>
          </div>
          <div id="entries-list-div" class="entries-list-div">
            <ul id="entries-list" class="entries-list"></ul>
          </div>
        </section>

        <section id="create-panel" class="panel create-panel hidden">
          <div class="entries-header">
            <h2>Cadastrar chave</h2>
            <button id="clear-create-btn" type="button" class="secondary">Limpar</button>
          </div>

          <div class="form-grid">
            <div>
              <label for="create-service">Serviço</label>
              <input id="create-service" type="text" autocomplete="off" placeholder="Ex.: github" />
            </div>
            <div>
              <label for="create-username">Usuário</label>
              <input id="create-username" type="text" autocomplete="off" placeholder="Ex.: joao" />
            </div>
            <div>
              <label for="create-password">Senha</label>
              <input id="create-password" type="password" autocomplete="off" placeholder="Senha da chave" />
            </div>
            <div>
              <label for="create-url">URL</label>
              <input id="create-url" type="url" autocomplete="off" placeholder="https://..." />
            </div>
          </div>

          <div class="create-notes-wrap">
            <label for="create-notes">Notas</label>
            <textarea id="create-notes" rows="3" placeholder="Opcional"></textarea>
          </div>

          <button id="create-entry-btn" type="button">Salvar chave</button>
        </section>

        <p id="status" class="status" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="popup.js" type="module"></script>
  </body>
</html>
